<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="https://telegra.ph/file/5f9f29b29b271ba408000.jpg" type="image/x-icon">
<link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<title>Mahabub Rahman</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#3b82f6;
  --blue-dark:#1d4ed8;
  --blue-light:#eff6ff;
  --indigo:#6366f1;
  --white:#ffffff;
  --gray-50:#f8fafc;
  --gray-100:#f1f5f9;
  --gray-200:#e2e8f0;
  --gray-400:#94a3b8;
  --gray-500:#64748b;
  --gray-700:#334155;
  --gray-900:#0f172a;
  --font:'Poppins',sans-serif;
  --radius-sm:8px;
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:28px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-700);min-height:100vh;transition:background .3s,color .3s}
a{text-decoration:none;color:inherit}
ul{list-style:none}
img{max-width:100%;display:block}

/* ── DARK ── */
body.dark{
  --white:#1e293b;
  --gray-50:#0f172a;
  --gray-100:#1e293b;
  --gray-200:#334155;
  --gray-400:#64748b;
  --gray-500:#94a3b8;
  --gray-700:#cbd5e1;
  --gray-900:#f1f5f9;
  --blue-light:rgba(59,130,246,.12);
}

/* ── THEME BTN ── */
.theme-btn{
  position:fixed;top:1.2rem;right:1.2rem;z-index:200;
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
  border:1.5px solid var(--gray-200);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;color:var(--gray-700);cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.08);transition:.3s;
}
.theme-btn:hover{border-color:var(--blue);color:var(--blue)}
body.dark .theme-btn{background:rgba(30,41,59,.85)}

/* ── HERO ── */
.hero{
  position:relative;height:260px;overflow:hidden;
  background:linear-gradient(135deg,#1d4ed8 0%,#3b82f6 35%,#6366f1 70%,#8b5cf6 100%);
}
.hero-anim{position:absolute;inset:0;overflow:hidden}
.blob{
  position:absolute;border-radius:50%;filter:blur(60px);opacity:.45;
  animation:drift 8s ease-in-out infinite alternate;
}
.blob-1{width:360px;height:360px;background:#93c5fd;top:-100px;left:-60px;animation-delay:0s}
.blob-2{width:280px;height:280px;background:#a5b4fc;top:20px;right:-40px;animation-delay:-3s}
.blob-3{width:200px;height:200px;background:#c4b5fd;bottom:-80px;left:40%;animation-delay:-5s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.1)}}

.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);
  background-size:36px 36px;
}

/* ── MAIN WRAPPER ── */
.page{max-width:700px;margin:0 auto;padding:0 1.25rem 4rem;position:relative;z-index:1}

/* ── PROFILE CARD ── */
.profile-card{
  background:var(--white);
  border-radius:var(--radius-xl);
  padding:0 1.75rem 2rem;
  box-shadow:0 8px 40px rgba(59,130,246,.12),0 2px 8px rgba(0,0,0,.06);
  margin-top:-72px;
  text-align:center;
  border:1px solid var(--gray-200);
}
body.dark .profile-card{border-color:var(--gray-200);box-shadow:0 8px 40px rgba(0,0,0,.4)}

/* ── AVATAR ── */
.avatar-wrap{
  display:inline-block;
  margin-top:-52px;margin-bottom:1.1rem;
  position:relative;
}
.avatar-ring{
  width:116px;height:116px;padding:3.5px;border-radius:50%;
  background:linear-gradient(145deg,#3b82f6,#6366f1,#8b5cf6);
  box-shadow:0 8px 28px rgba(99,102,241,.4);
}
.avatar-inner{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  border:3.5px solid var(--white);background:var(--gray-100);
}
.avatar-inner img{width:100%;height:100%;object-fit:cover}
.avatar-status{
  position:absolute;bottom:8px;right:8px;
  width:18px;height:18px;border-radius:50%;
  background:#22c55e;border:3px solid var(--white);
  box-shadow:0 0 0 2px rgba(34,197,94,.3);
  animation:statusPulse 2.5s ease-in-out infinite;
}
@keyframes statusPulse{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.3)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

/* ── NAME ── */
.profile-name{
  font-size:1.55rem;font-weight:800;color:var(--gray-900);
  letter-spacing:-.025em;margin-bottom:.35rem;line-height:1.15;
}
.profile-role{
  display:inline-flex;align-items:center;gap:.45rem;
  font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--blue);background:var(--blue-light);
  padding:.3rem 1rem;border-radius:2rem;margin-bottom:1.6rem;
  border:1px solid rgba(59,130,246,.2);
}
.profile-role i{font-size:.9rem}

/* ── STAT ROW ── */
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  overflow:hidden;margin-bottom:1.6rem;
}
.stat-cell{
  padding:.9rem .5rem;text-align:center;
  border-right:1.5px solid var(--gray-200);
  transition:background .2s;cursor:default;
}
.stat-cell:last-child{border-right:none}
.stat-cell:hover{background:var(--blue-light)}
.stat-num{
  font-size:1.2rem;font-weight:800;color:var(--gray-900);
  display:block;line-height:1.2;margin-bottom:.18rem;
}
.stat-desc{font-size:.66rem;font-weight:500;color:var(--gray-400);line-height:1.3}

/* ── SOCIALS ── */
.socials{display:flex;justify-content:center;gap:.55rem;margin-bottom:1.6rem}
.soc-btn{
  width:42px;height:42px;border-radius:50%;
  background:var(--gray-100);border:1.5px solid var(--gray-200);
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;color:var(--gray-500);
  transition:.25s;
}
.soc-btn:hover{
  background:var(--blue);border-color:var(--blue);color:#fff;
  transform:translateY(-3px);box-shadow:0 8px 20px rgba(59,130,246,.35);
}

/* ── ACTION BTNS ── */
.actions{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.72rem 1.45rem;border-radius:.75rem;
  font-family:var(--font);font-size:.85rem;font-weight:600;
  cursor:pointer;border:none;transition:.25s;
}
.btn-fill{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;box-shadow:0 6px 20px rgba(99,102,241,.38);
}
.btn-fill:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(99,102,241,.5)}
.btn-outline{
  background:var(--white);color:var(--gray-700);
  border:1.5px solid var(--gray-200);
}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-2px)}

/* ── TABS ── */
.tab-wrap{margin-top:2rem}
.tab-bar{
  display:flex;background:var(--white);
  border:1.5px solid var(--gray-200);
  border-radius:var(--radius);padding:.3rem;gap:.3rem;
  box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:1.75rem;
}
.tab{
  flex:1;padding:.72rem .5rem;border:none;background:transparent;
  font-family:var(--font);font-size:.875rem;font-weight:500;
  color:var(--gray-400);border-radius:.625rem;cursor:pointer;transition:.25s;
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.tab i{font-size:1rem}
.tab:hover{color:var(--gray-700);background:var(--gray-100)}
.tab.active{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;font-weight:600;
  box-shadow:0 4px 14px rgba(99,102,241,.35);
}

/* ── PANELS ── */
.panel{display:none}.panel.active{display:block}

/* ── PROJECT CARDS ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
.proj-card{
  background:var(--white);border-radius:var(--radius-lg);
  overflow:hidden;border:1.5px solid var(--gray-200);
  box-shadow:0 2px 12px rgba(0,0,0,.05);
  transition:transform .3s,box-shadow .3s;
}
.proj-card:hover{transform:translateY(-8px);box-shadow:0 20px 48px rgba(59,130,246,.15)}
.proj-thumb{position:relative;aspect-ratio:16/10;overflow:hidden;background:var(--gray-100)}
.proj-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.proj-card:hover .proj-thumb img{transform:scale(1.07)}
.proj-hover{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(15,23,42,.92) 0%,rgba(15,23,42,.2) 55%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem;
  opacity:0;transition:opacity .3s;
}
.proj-card:hover .proj-hover{opacity:1}
.proj-hover-tag{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#93c5fd;margin-bottom:.25rem}
.proj-hover-title{font-size:1rem;font-weight:700;color:#fff;margin-bottom:.75rem}
.proj-hover-link{
  display:inline-flex;align-items:center;gap:.4rem;
  background:#3b82f6;color:#fff;
  font-size:.75rem;font-weight:600;padding:.42rem .9rem;
  border-radius:.5rem;width:fit-content;transition:.2s;
}
.proj-hover-link:hover{background:#2563eb}

.proj-body{padding:.95rem 1.1rem 1.1rem;display:flex;align-items:center;justify-content:space-between}
.proj-tag{
  font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--blue);background:var(--blue-light);padding:.22rem .65rem;border-radius:2rem;
  border:1px solid rgba(59,130,246,.2);margin-bottom:.25rem;display:inline-block;
}
.proj-title{font-size:.9rem;font-weight:600;color:var(--gray-900)}
.proj-icon-link{
  width:36px;height:36px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:.2s;flex-shrink:0;
  box-shadow:0 4px 10px rgba(99,102,241,.3);
}
.proj-icon-link:hover{box-shadow:0 6px 16px rgba(99,102,241,.5);transform:scale(1.06)}

/* ── SKILLS ── */
.skill-card{
  background:var(--white);border-radius:var(--radius-lg);
  border:1.5px solid var(--gray-200);padding:1.6rem;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.skill-head{
  display:flex;align-items:center;gap:.65rem;margin-bottom:1.4rem;
}
.skill-head-icon{
  width:34px;height:34px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1rem;flex-shrink:0;
}
.skill-head-title{font-size:.8rem;font-weight:700;color:var(--gray-900);text-transform:uppercase;letter-spacing:.1em}
.skill-head-line{flex:1;height:1.5px;background:var(--gray-200);border-radius:2px}

.skill-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.7rem}
.skill-pill{
  display:flex;align-items:center;gap:.65rem;
  padding:.65rem .95rem;border-radius:.75rem;
  background:var(--gray-50);border:1.5px solid var(--gray-200);
  transition:.25s;cursor:default;
}
.skill-pill:hover{
  background:var(--blue-light);border-color:rgba(59,130,246,.4);
  transform:translateY(-2px);box-shadow:0 6px 16px rgba(59,130,246,.1);
}
.skill-dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);flex-shrink:0}
.skill-pname{font-size:.84rem;font-weight:600;color:var(--gray-900)}
.skill-plevel{font-size:.67rem;color:var(--gray-400);margin-top:.05rem}

/* ── FOOTER ── */
.footer{text-align:center;padding:1rem 0 2rem;font-size:.73rem;color:var(--gray-400)}
.footer span{color:var(--blue);font-weight:500}

/* ── REVEAL ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.profile-card>*{animation:fadeUp .5s ease both}
.profile-card>*:nth-child(1){animation-delay:.06s}
.profile-card>*:nth-child(2){animation-delay:.13s}
.profile-card>*:nth-child(3){animation-delay:.2s}
.profile-card>*:nth-child(4){animation-delay:.27s}
.profile-card>*:nth-child(5){animation-delay:.34s}
.profile-card>*:nth-child(6){animation-delay:.41s}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:.45rem;background:var(--gray-100)}
::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .hero{height:200px}
  .profile-name{font-size:1.3rem}
  .actions{flex-direction:column;align-items:center}
  .proj-grid{grid-template-columns:1fr}
  .skill-list{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:680px){
  .hero{height:290px}
  .avatar-ring{width:130px;height:130px}
  .avatar-wrap{margin-top:-58px}
}
</style>
</head>
<body>

<script src="https://unpkg.com/scrollreveal"></script>
<script>
  /* ── Tabs ── */
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.target).classList.add('active');
    });
  });

  /* ── Theme ── */
  const btn=document.getElementById('themeBtn'),icon=document.getElementById('themeIcon');
  let dark=localStorage.getItem('theme')==='dark';
  const setTheme=()=>{
    document.body.classList.toggle('dark',dark);
    icon.className=dark?'ri-sun-line':'ri-moon-line';
  };
  setTheme();
  btn.addEventListener('click',()=>{ dark=!dark; localStorage.setItem('theme',dark?'dark':'light'); setTheme(); });

  /* ── Scroll reveal ── */
  const sr=ScrollReveal({origin:'bottom',distance:'30px',duration:700,delay:100,easing:'cubic-bezier(.22,1,.36,1)'});
  sr.reveal('.tab-wrap',{delay:200});
  sr.reveal('.proj-card',{delay:250,interval:120});
  sr.reveal('.skill-card',{delay:200});
</script>
